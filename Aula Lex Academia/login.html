<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Aula Virtual — LexAcademia Pro</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0e1a35, #142b5c);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      width: 340px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .login-container img {
      width: 80px;
      height: auto;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.8));
    }

    .login-container h1 {
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 1.8em;
      letter-spacing: 0.5px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background-color: rgba(255,255,255,0.9);
    }

    .login-container input:focus {
      outline: 2px solid #d4af37;
    }

    .login-container button {
      background-color: #d4af37;
      color: #fff;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .login-container button:hover {
      background-color: #b9952f;
    }

    .login-container p {
      margin-top: 15px;
      color: #ccc;
      font-size: 0.9em;
    }

    .login-container a {
      color: #d4af37;
      text-decoration: none;
    }

    .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="img/logo-lexacademia.png" alt="Logo LexAcademia Pro">
    <h1>LexAcademia Pro</h1>
    <form onsubmit="return iniciarSesion(event)">
      <input type="text" id="usuario" placeholder="Usuario" required>
      <input type="password" id="clave" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
    <p>¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a></p>
  </div>

  <script>
    function iniciarSesion(event) {
      event.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const clave = document.getElementById('clave').value;

      if (usuario && clave) {
        window.location.href = "Aula/index.html";
      } else {
        alert("Por favor, ingresa tus datos.");
      }
    }
  </script>
</body>
</html>
